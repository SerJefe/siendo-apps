<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Condugas · Control Flota · Vehículo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
:root{
  --bg:#F5F7FA; --panel:#FFFFFF; --border:#E5E9F0;
  --turquesa:#1AA89A; --grafito:#1F2A37; --muted:#64748B;
  --ok:#16A34A; --warn:#F59E0B; --crit:#DC2626; --off:#94A3B8;
  --shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
  background:var(--bg);color:var(--grafito);font-size:14px;height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh}
header{background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;box-shadow:var(--shadow)}
header h1{margin:0;font-size:16px;font-weight:600;letter-spacing:-.01em}
header h1 .badge{background:var(--turquesa);color:#fff;padding:2px 8px;border-radius:4px;
  font-size:11px;margin-left:8px;font-weight:500}
header nav{display:flex;gap:6px;margin-left:24px}
header nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;transition:all .15s}
header nav a:hover{background:#F1F5F9;color:var(--grafito)}
header nav a.active{background:#F1F5F9;color:var(--grafito)}
header .placa{font-family:'SF Mono',Consolas,monospace;background:#F1F5F9;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:600;margin-left:8px}
header .switcher{margin-left:8px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px}
header .right{margin-left:auto;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px}
header .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:6px}

main{display:grid;grid-template-columns:340px 1fr 360px;overflow:hidden}
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.right-panel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:16px}

.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);font-weight:600;margin:0 0 10px}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.kpi{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.kpi .v{font-size:20px;font-weight:600;color:var(--grafito)}
.kpi .l{font-size:11px;color:var(--muted);margin-top:2px}

.day-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.day-chip{background:#F1F5F9;border:1px solid var(--border);padding:6px 10px;border-radius:6px;
  cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.day-chip:hover{background:#E2E8F0}
.day-chip.active{background:var(--turquesa);color:#fff;border-color:var(--turquesa)}
.day-chip .km{font-size:10px;opacity:.7;margin-left:4px}

.zone{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.zone:hover{border-color:var(--turquesa)}
.zone .name{font-size:12px;font-weight:600;line-height:1.3}
.zone .meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;gap:10px}
.zone .meta span:first-child{color:var(--turquesa);font-weight:600}

.day-detail .kpis-day{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin-bottom:12px}
.day-detail .kpis-day div{background:#F8FAFC;padding:6px 8px;border-radius:4px}
.day-detail .kpis-day b{display:block;font-size:14px;font-weight:600;color:var(--grafito)}
.day-detail .kpis-day span{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em}

.timeline{position:relative}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.event{position:relative;padding-left:24px;margin-bottom:10px}
.event::before{content:'';position:absolute;left:4px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--turquesa);border:2px solid #fff;box-shadow:0 0 0 1px var(--turquesa)}
.event.stop::before{background:var(--warn)}
.event .hora{font-size:11px;color:var(--muted);font-weight:600}
.event .desc{font-size:12px;margin-top:2px}
.event .dur{font-size:11px;color:var(--warn);font-weight:600;margin-top:2px}

.alerts{margin-top:12px}
.alert{background:#FEF3C7;border-left:3px solid var(--warn);padding:8px 10px;margin-bottom:6px;border-radius:4px;font-size:12px}
.alert.baja{background:#F1F5F9;border-left-color:var(--off)}
.alert .tipo{font-weight:600;text-transform:capitalize}
.alert .meta{font-size:10px;color:var(--muted);margin-top:2px}

#map{height:100%;width:100%}
.leaflet-container{background:#0F172A}
.marker-stop{background:var(--warn);color:#fff;border-radius:50%;text-align:center;font-weight:700;
  width:24px!important;height:24px!important;line-height:24px;font-size:12px;
  border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.marker-zone{background:var(--turquesa);color:#fff;border-radius:50%;
  width:32px!important;height:32px!important;line-height:32px;text-align:center;font-weight:700;
  border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);font-size:11px}

.legend{position:absolute;bottom:20px;right:20px;background:rgba(255,255,255,.95);
  padding:10px 12px;border-radius:8px;font-size:11px;box-shadow:var(--shadow);z-index:1000}
.legend .item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend .sw{width:12px;height:12px;border-radius:50%}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
.empty h3{font-size:14px;color:var(--grafito);margin:0 0 8px}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>Condugas <span class="badge">Control Flota</span></h1>
  <nav>
    <a href="../">Vista flota</a>
    <a href="./" class="active">Por vehículo</a>
  </nav>
  <div class="placa" id="placa-display">—</div>
  <select class="switcher" id="placa-switcher"></select>
  <div class="right">
    <span><span class="dot"></span>Semana <span id="rango">—</span></span>
    <span id="gen-time">—</span>
  </div>
</header>
<main>

  <aside class="sidebar">
    <h2 class="section-title">Resumen del vehículo</h2>
    <div class="kpi-grid" id="kpi-grid"></div>

    <h2 class="section-title">Días</h2>
    <div class="day-chips" id="day-chips"></div>

    <h2 class="section-title">Zonas detectadas</h2>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">
      Paradas ≥20 min repetidas. Candidatos a registrar como obra.
    </div>
    <div id="zones-list"></div>
  </aside>

  <section style="position:relative">
    <div id="map"></div>
    <div class="legend">
      <div class="item"><span class="sw" style="background:var(--turquesa)"></span>Zona recurrente</div>
      <div class="item"><span class="sw" style="background:var(--warn)"></span>Parada del día</div>
      <div class="item"><span class="sw" style="background:#fff;border:2px solid var(--turquesa)"></span>Recorrido</div>
    </div>
  </section>

  <aside class="right-panel">
    <h2 class="section-title">Día seleccionado</h2>
    <div id="day-detail"></div>

    <h2 class="section-title" style="margin-top:20px">Alertas de la semana</h2>
    <div class="alerts" id="alerts-list"></div>
  </aside>

</main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
let DATA = null, map = null, layers = { track:null, stops:[], zones:[] };

function getPlaca(){
  const q = new URLSearchParams(location.search);
  return (q.get('placa') || '').toUpperCase();
}

async function loadFleet(){
  const res = await fetch('../data/flota.json');
  if (!res.ok) return null;
  return await res.json();
}

async function load(){
  let placa = getPlaca();
  const fleet = await loadFleet();
  if (fleet && fleet.vehiculos.length) {
    // Llenar switcher
    const sw = document.getElementById('placa-switcher');
    sw.innerHTML = fleet.vehiculos.map(v =>
      `<option value="${v.placa}"${v.placa===placa?' selected':''}>${v.placa} (${v.km}km)</option>`
    ).join('');
    sw.addEventListener('change', () => {
      location.search = '?placa=' + sw.value;
    });
    if (!placa) placa = fleet.vehiculos[0].placa;
  }
  if (!placa) {
    document.querySelector('main').innerHTML = '<div class="empty" style="margin:auto"><h3>Sin vehículo seleccionado</h3>Volvé a <a href="../">Vista flota</a>.</div>';
    return;
  }
  document.getElementById('placa-display').textContent = placa;

  try {
    const res = await fetch(`../data/v/${placa}-semana.json`);
    if (!res.ok) throw new Error(`No hay datos para ${placa}`);
    DATA = await res.json();
    document.getElementById('gen-time').textContent = 'Gen: ' + DATA.generated_at;
    document.getElementById('rango').textContent = `${DATA.rango.desde} → ${DATA.rango.hasta}`;
    renderKpis();
    renderDayChips();
    renderZones();
    renderAlerts();
    initMap();
    selectDay(DATA.dias[0].fecha);
  } catch(e) {
    document.getElementById('kpi-grid').innerHTML = `<div class="empty"><h3>Sin datos</h3>${e.message}</div>`;
  }
}

function renderKpis(){
  const r = DATA.resumen_semana;
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi"><div class="v">${r.km_totales}</div><div class="l">Km totales</div></div>
    <div class="kpi"><div class="v">${r.dias_operativos}</div><div class="l">Días operativos</div></div>
    <div class="kpi"><div class="v">${r.horas_efectivas_obra}h</div><div class="l">Horas en obra</div></div>
    <div class="kpi"><div class="v">${r.zonas_recurrentes}</div><div class="l">Zonas</div></div>
    <div class="kpi" style="grid-column:1/-1"><div class="v">${r.alertas_totales}</div><div class="l">Alertas detectadas</div></div>
  `;
}

function renderDayChips(){
  const cont = document.getElementById('day-chips');
  cont.innerHTML = DATA.dias.map(d => {
    const dt = new Date(d.fecha + 'T00:00');
    const nom = dt.toLocaleDateString('es-CO',{weekday:'short',day:'numeric'}).replace('.','');
    return `<div class="day-chip" data-fecha="${d.fecha}">${nom}<span class="km">${d.kpis.km||0}km</span></div>`;
  }).join('');
  cont.querySelectorAll('.day-chip').forEach(el => {
    el.addEventListener('click', () => selectDay(el.dataset.fecha));
  });
}

function renderZones(){
  document.getElementById('zones-list').innerHTML = DATA.zonas_frecuentes.map(z => `
    <div class="zone" data-lat="${z.lat}" data-lon="${z.lon}">
      <div class="name">${z.direccion}</div>
      <div class="meta"><span>${z.visitas} visitas</span><span>${z.horas_totales}h totales</span></div>
    </div>
  `).join('');
  document.querySelectorAll('.zone').forEach(el => {
    el.addEventListener('click', () => map.setView([+el.dataset.lat, +el.dataset.lon], 17));
  });
}

function renderAlerts(){
  const cont = document.getElementById('alerts-list');
  if (!DATA.alertas.length) { cont.innerHTML = '<div style="color:var(--muted);font-size:12px">Sin alertas</div>'; return; }
  cont.innerHTML = DATA.alertas.slice(0,20).map(a => `
    <div class="alert ${a.severidad}">
      <div class="tipo">${a.tipo.replace('_',' ')}</div>
      <div>${a.detalle}</div>
      <div class="meta">${a.fecha} · ${a.hora}</div>
    </div>
  `).join('');
}

function initMap(){
  map = L.map('map').setView([6.27, -75.58], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(map);
  DATA.zonas_frecuentes.forEach((z,i) => {
    L.marker([z.lat, z.lon], {
      icon: L.divIcon({className:'marker-zone', html:(i+1), iconSize:[32,32]})
    }).addTo(map).bindPopup(`<b>${z.direccion}</b><br>${z.visitas} visitas · ${z.horas_totales}h`);
  });
}

function selectDay(fecha){
  document.querySelectorAll('.day-chip').forEach(c => c.classList.toggle('active', c.dataset.fecha === fecha));
  const dia = DATA.dias.find(d => d.fecha === fecha);
  if (!dia) return;
  if (layers.track) map.removeLayer(layers.track);
  layers.stops.forEach(m => map.removeLayer(m));
  layers.stops = [];
  const latlngs = dia.track.map(p => [p.lat, p.lon]);
  if (latlngs.length) {
    layers.track = L.polyline(latlngs, {color:'#1AA89A', weight:3, opacity:.8}).addTo(map);
    map.fitBounds(layers.track.getBounds(), {padding:[40,40]});
  }
  dia.stops.forEach((s,i) => {
    const m = L.marker([s.lat, s.lon], {
      icon: L.divIcon({className:'marker-stop', html:(i+1), iconSize:[24,24]})
    }).addTo(map);
    m.bindPopup(`<b>P${i+1} · ${s.direccion}</b><br>${s.inicio}–${s.fin} (${s.duracion_min}min)<br><i>${s.ignicion}</i>`);
    layers.stops.push(m);
  });
  renderDayDetail(dia);
}

function renderDayDetail(d){
  const k = d.kpis;
  const stopsHtml = d.stops.map((s,i) => `
    <div class="event stop">
      <div class="hora">${s.inicio} – ${s.fin}</div>
      <div class="desc">P${i+1} · ${s.direccion}</div>
      <div class="dur">${s.duracion_min} min · ${s.ignicion}</div>
    </div>
  `).join('');
  document.getElementById('day-detail').innerHTML = `
    <div class="day-detail">
      <div class="kpis-day">
        <div><span>Arranque</span><b>${k.hora_arranque||'—'}</b></div>
        <div><span>Cierre</span><b>${k.hora_fin||'—'}</b></div>
        <div><span>Km</span><b>${k.km||0}</b></div>
        <div><span>Vel. máx</span><b>${k.vel_max_kmh||0} km/h</b></div>
        <div><span>Encendido</span><b>${Math.round((k.tiempo_encendido_min||0)/60*10)/10}h</b></div>
        <div><span>Paradas</span><b>${d.stops.length}</b></div>
      </div>
      <h3 style="font-size:12px;margin:0 0 8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Paradas del día</h3>
      <div class="timeline">${stopsHtml || '<div style="color:var(--muted);font-size:12px">Sin paradas detectadas</div>'}</div>
    </div>
  `;
}

load();
</script>
</body>
</html>
