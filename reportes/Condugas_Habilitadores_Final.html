<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONDUGAS · Habilitadores Organizacionales</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#060911;color:#e2e8f0;display:flex;flex-direction:column;min-height:100vh}
header{text-align:center;padding:1.2rem 1rem .3rem}
header h1{font-size:clamp(1.1rem,3vw,1.6rem);font-weight:800}
header h1 b{background:linear-gradient(135deg,#f97316,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#6b7a90;font-size:.7rem;margin-top:.2rem}
.bar{display:flex;justify-content:center;gap:.6rem;padding:.3rem 1rem;flex-wrap:wrap;font-size:.6rem}
.bar .g{display:flex;align-items:center;gap:.25rem;color:#6b7a90}
.bar .d{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff}
.filters{display:flex;justify-content:center;gap:.3rem;padding:.2rem 1rem .4rem;flex-wrap:wrap}
.fb{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:#6b7a90;font-family:'Outfit';font-size:.62rem;padding:.2rem .55rem;border-radius:4px;cursor:pointer;transition:all .15s}
.fb:hover{background:rgba(255,255,255,.06)}.fb.on{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
#cv{flex:1;width:100%}
.panel{position:fixed;bottom:0;left:0;right:0;background:rgba(6,9,17,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06);padding:1.2rem 1.5rem;transform:translateY(100%);transition:transform .3s;z-index:10;max-height:45vh;overflow-y:auto}
.panel.open{transform:translateY(0)}
.panel h3{font-size:.95rem;font-weight:700}.panel .mt{font-family:'JetBrains Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:#6b7a90;margin-bottom:.4rem}
.panel p{font-size:.78rem;color:#6b7a90;line-height:1.5;margin-bottom:.25rem}
.panel .cl{position:absolute;top:.5rem;right:.7rem;background:none;border:none;color:#6b7a90;font-size:1rem;cursor:pointer}
.hi{display:flex;align-items:center;gap:.4rem;font-size:.73rem;padding:.3rem .4rem;background:rgba(255,255,255,.025);border-radius:4px;margin-top:.25rem;border-left:3px solid #555}
.hi.H{border-left-color:#ec4899}.hi.O{border-left-color:#eab308}.hi.T{border-left-color:#06b6d4}
.hi .badge{font-family:'JetBrains Mono',monospace;font-size:.55rem;font-weight:700;min-width:14px;padding:1px 3px;border-radius:2px;text-align:center}
.hi .badge.H{background:rgba(236,72,153,.15);color:#ec4899}.hi .badge.O{background:rgba(234,179,8,.15);color:#eab308}.hi .badge.T{background:rgba(6,182,212,.15);color:#06b6d4}
.hi .s{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.55rem}
</style>
</head>
<body>
<header>
  <h1>Habilitadores <b>Organizacionales</b> · Condugas</h1>
  <p>Clasificados según la guía ESIC: Humano · Operativo · Tecnológico — conectados a cada proyecto</p>
</header>
<div class="bar">
  <div class="g"><div class="d" style="background:#ec4899">H</div>Humano</div>
  <div class="g"><div class="d" style="background:#eab308">O</div>Operativo</div>
  <div class="g"><div class="d" style="background:#06b6d4">T</div>Tecnológico</div>
  <div class="g" style="margin-left:.5rem"><div class="d" style="background:#22c55e;border-radius:50%;font-size:8px">⚡</div>Quick Win</div>
  <div class="g"><div class="d" style="background:#f97316;border-radius:50%;font-size:6px">●</div>Prioritario</div>
  <div class="g"><div class="d" style="background:#ef4444;border-radius:50%;font-size:6px">●</div>Esperar</div>
  <div class="g" style="margin-left:.5rem"><div class="d" style="background:#333;font-size:6px;color:#888">T</div>Tarea</div>
</div>
<div class="filters">
  <button class="fb on" data-f="all">Todos</button>
  <button class="fb" data-f="P1">P1 CVE</button>
  <button class="fb" data-f="P2">P2 Bot</button>
  <button class="fb" data-f="P3">P3 Play</button>
  <button class="fb" data-f="P4">P4 Mérito</button>
  <button class="fb" data-f="H">Solo Humanos</button>
  <button class="fb" data-f="O">Solo Operativos</button>
  <button class="fb" data-f="T">Solo Tecnológicos</button>
</div>
<svg id="cv" viewBox="0 0 1200 750"></svg>
<div class="panel" id="pn"><button class="cl" onclick="this.parentElement.classList.remove('open')">×</button><div id="pc"></div></div>

<script>
const svg=document.getElementById('cv'),NS='http://www.w3.org/2000/svg';
let flt='all';
function $(t,a,p){const e=document.createElementNS(NS,t);if(a)Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));if(p)p.appendChild(e);return e}

const HC={H:'#ec4899',O:'#eab308',T:'#06b6d4'};
const HN={H:'Humano',O:'Operativo',T:'Tecnológico'};
const HQ={H:'¿Qué necesitan las personas?',O:'¿Qué debe cambiar en la operación?',T:'¿Qué herramientas se necesitan?'};

const PJ={
  P1:{cx:170,cy:250,label:'P1 · CVE',sub:'Calculadora Valor Empleado',pri:'⚡ QUICK WIN',pc:'#22c55e',inv:'$8–15M',ph:'Mes 1–4',
    dt:'Mide ROI del ciclo de vida. Datos de rotación existen (Natalia Rojas). Costos de contratación NO están trazados. Modelo Excel → Power BI.',
    h:[
      {l:'Mapeo costos contratación',t:'O',s:0,st:'No existe → construir desde cero',q:'Rediseñar proceso RRHH para trazar costos'},
      {l:'Datos históricos rotación',t:'T',s:2,st:'Natalia Rojas los tiene',q:'Integrar datos existentes al modelo'},
      {l:'Formación RRHH en datos',t:'H',s:0,st:'No saben dashboards · DMLA 4.62',q:'Capacitar al equipo en análisis de datos'},
      {l:'Integración nómina',t:'T',s:1,st:'Nómina existe, no conectada',q:'Conectar sistema de nómina al CVE'},
      {l:'Responsable del dato',t:'O',s:0,st:'William era responsable',q:'Definir quién mantiene el modelo actualizado'},
      {l:'Cultura medir valor empleado',t:'H',s:0,st:'Concepto no existe · DMLA 3.5',q:'Generar conciencia del costo de la rotación'},
    ],
    tk:['Andrea: data costos','William: socializar HE']},
  P2:{cx:440,cy:190,label:'P2 · Bot',sub:'Zona E WhatsApp',pri:'● PRIORITARIO',pc:'#f97316',inv:'$12–20M',ph:'Mes 3–6',
    dt:'Canal comunicación 500+ colaboradores. Good Boss NO existe. Proveedor no seleccionado. Procesos RRHH sin estandarizar.',
    h:[
      {l:'Proveedor WhatsApp API',t:'T',s:0,st:'Cotizar Twilio / Make',q:'Evaluar y seleccionar proveedor tecnológico'},
      {l:'Plataforma base',t:'T',s:0,st:'Good Boss NO existe',q:'Definir qué plataforma orquesta el bot'},
      {l:'Estandarizar procesos RRHH',t:'O',s:0,st:'Manuales · DMLA 3.50',q:'Digitalizar flujos antes de automatizar'},
      {l:'Confianza técnicos digital',t:'H',s:1,st:'Variable por contrato',q:'Acompañar adopción con gestión del cambio'},
      {l:'Admin bot (RRHH + TI)',t:'O',s:0,st:'No asignado',q:'Nombrar responsable operativo del canal'},
      {l:'Flujos conversacionales',t:'O',s:0,st:'No diseñados',q:'Diseñar árboles de decisión por caso de uso'},
      {l:'Gestión del cambio',t:'H',s:0,st:'DMLA Cultura 3.5',q:'Explicar al equipo el por qué del bot'},
    ],
    tk:['E3: cotizar proveedores','Seb: diseñar flujos']},
  P3:{cx:750,cy:230,label:'P3 · Play',sub:'Gamificación por Rol',pri:'● PRIORITARIO',pc:'#f97316',inv:'$15–25M',ph:'Mes 3–6',
    dt:'XP por KPIs de 4 roles. KPIs hay que construir desde cero. Supervisores no miden. Campo es informal.',
    h:[
      {l:'KPIs por rol (×4)',t:'O',s:0,st:'Crear desde cero · DMLA 4.62',q:'Definir métricas medibles por cada perfil'},
      {l:'Datos desempeño campo',t:'T',s:0,st:'Informales · DMLA Big Data 2.0',q:'Sistematizar captura de datos en campo'},
      {l:'Sistema niveles/insignias',t:'O',s:1,st:'Conceptual (Sebastián)',q:'Diseñar la mecánica de progresión'},
      {l:'Plataforma gamificación',t:'T',s:0,st:'No seleccionada',q:'Evaluar plataformas o desarrollo propio'},
      {l:'Liderazgo supervisores',t:'H',s:0,st:'No miden formalmente',q:'Formar supervisores como líderes de datos'},
      {l:'Integración nómina bonos',t:'T',s:0,st:'No conectado',q:'Vincular puntos con sistema de compensación'},
    ],
    tk:['Seb: concepto gamificación','E3: cotizar plataformas']},
  P4:{cx:1020,cy:310,label:'P4 · Mérito',sub:'Incentivos por Mérito',pri:'● ESPERAR (P1+P3)',pc:'#ef4444',inv:'$20–40M/año',ph:'Mes 5–12',
    dt:'Existe parcialmente en campo. En otros cargos no. Concepto NO validado con gerencia. Depende de P1 (datos) y P3 (puntos).',
    h:[
      {l:'Validar concepto gerencia',t:'H',s:0,st:'Paso crítico → NO hecho',q:'Presentar caso financiero a la dirección'},
      {l:'Reglas mérito por área',t:'O',s:1,st:'Solo campo parcial',q:'Extender reglas a todos los cargos'},
      {l:'Demostrar ahorro = inversión',t:'O',s:0,st:'Requiere P1 primero',q:'Usar CVE para justificar el programa'},
      {l:'Catálogo recompensas',t:'O',s:0,st:'No existe',q:'Diseñar opciones atractivas por perfil'},
      {l:'Integración gamificación',t:'T',s:0,st:'Depende de P3',q:'Conectar puntos de Play con canje Mérito'},
      {l:'Comunicar 500+ personas',t:'H',s:0,st:'DMLA Cliente 3.50',q:'Usar bot (P2) como canal de lanzamiento'},
    ],
    tk:['E3: validar con gerencia']},
};

const CROSS=[
  {a:'P1',b:'P4',l:'datos → justificación'},{a:'P3',b:'P4',l:'puntos → canje'},
  {a:'P2',b:'P3',l:'canal → notificar'},{a:'P2',b:'P4',l:'canal → comunicar'},
];

function isVis(node){
  if(flt==='all') return 1;
  if(flt==='H'||flt==='O'||flt==='T') return node.t===flt?1:.08;
  if(node._proj===flt) return 1;
  return .08;
}
function isProjVis(id){
  if(flt==='all') return 1;
  if(flt===id) return 1;
  if(flt==='H'||flt==='O'||flt==='T'){
    return PJ[id].h.some(h=>h.t===flt)?1:.2;
  }
  return .15;
}

function render(){
  svg.innerHTML='';
  const defs=$('defs',null,svg);
  $('style',null,svg).textContent=`
    @keyframes dash{to{stroke-dashoffset:-24}}
    .pulse{animation:dash 2s linear infinite}
    @keyframes breathe{0%,100%{opacity:.5}50%{opacity:.9}}
    .breathe{animation:breathe 2.5s ease-in-out infinite}
  `;
  ['g','o','r','h','op','t'].forEach((n,i)=>{
    const f=$('filter',{id:`f${n}`,x:'-40%',y:'-40%',width:'180%',height:'180%'},defs);
    $('feGaussianBlur',{in:'SourceGraphic',stdDeviation:'5'},f);
  });
  CROSS.forEach(c=>{
    let a=PJ[c.a],b=PJ[c.b];
    let vis=Math.max(isProjVis(c.a),isProjVis(c.b));
    let my=Math.min(a.cy,b.cy)-45;
    $('path',{d:`M${a.cx},${a.cy} Q${(a.cx+b.cx)/2},${my} ${b.cx},${b.cy}`,fill:'none',stroke:'rgba(255,255,255,.04)','stroke-width':1,'stroke-dasharray':'5,8',opacity:vis},svg);
    if(vis>.5)$('text',{x:(a.cx+b.cx)/2,y:my-3,'text-anchor':'middle','font-size':'6.5',fill:`rgba(255,255,255,${vis*.2})`,'font-family':"'JetBrains Mono',monospace"},svg).textContent=c.l;
  });
  Object.entries(PJ).forEach(([id,p])=>{
    let pv=isProjVis(id);
    let rR=135;
    let base=id==='P1'?Math.PI*.55:id==='P2'?Math.PI*.42:id==='P3'?Math.PI*.38:Math.PI*.3;
    let sw=Math.PI*1.2;
    let hN=p.h.length;
    $('circle',{cx:p.cx,cy:p.cy,r:rR,fill:'none',stroke:p.pc,'stroke-opacity':pv*.06,'stroke-width':1,'stroke-dasharray':'2,10'},svg);
    const rg=$('radialGradient',{id:`bg${id}`,cx:'50%',cy:'50%',r:'50%'},defs);
    $('stop',{offset:'0%','stop-color':p.pc,'stop-opacity':String(pv*.05)},rg);
    $('stop',{offset:'100%','stop-color':p.pc,'stop-opacity':'0'},rg);
    $('circle',{cx:p.cx,cy:p.cy,r:90,fill:`url(#bg${id})`},svg);
    p.h.forEach((h,i)=>{
      h._proj=id;
      let a=base+sw*(i/(hN-1||1));
      let hx=p.cx+Math.cos(a)*rR;
      let hy=p.cy+Math.sin(a)*rR;
      h._x=hx;h._y=hy;
      let hv=isVis(h);
      let tc=HC[h.t];
      $('line',{x1:p.cx,y1:p.cy,x2:hx,y2:hy,stroke:tc,'stroke-opacity':hv*.1,'stroke-width':1},svg);
      if(hv>.5)$('line',{x1:p.cx,y1:p.cy,x2:hx,y2:hy,stroke:tc,'stroke-opacity':.3,'stroke-width':1,'stroke-dasharray':'3,21',class:'pulse'},svg);
      let g=$('g',{style:`cursor:pointer;opacity:${hv}`},svg);
      $('circle',{cx:hx,cy:hy,r:23,fill:tc,'fill-opacity':.04,stroke:tc,'stroke-opacity':.25,'stroke-width':2,class:hv>.5?'breathe':''},g);
      $('circle',{cx:hx,cy:hy,r:18,fill:tc,'fill-opacity':.08,stroke:tc,'stroke-opacity':.15,'stroke-width':1},g);
      $('circle',{cx:hx,cy:hy+16,r:3,fill:p.pc,opacity:.6},g);
      let sc=h.s===0?'#ef4444':h.s===2?'#22c55e':'#eab308';
      $('circle',{cx:hx-15,cy:hy-15,r:4,fill:sc,stroke:'#060911','stroke-width':1.5},g);
      let bg=$('g',null,g);
      $('rect',{x:hx+9,y:hy-19,width:16,height:12,rx:3,fill:tc,'fill-opacity':.2,stroke:tc,'stroke-opacity':.4,'stroke-width':.5},bg);
      $('text',{x:hx+17,y:hy-10.5,'text-anchor':'middle','font-size':'8',fill:tc,'font-weight':'800','font-family':"'JetBrains Mono',monospace"},bg).textContent=h.t;
      let words=h.l.split(' '),mid=Math.ceil(words.length/2);
      let l1=words.slice(0,mid).join(' '),l2=words.slice(mid).join(' ');
      $('text',{x:hx,y:l2?hy-3:hy+1,'text-anchor':'middle','font-size':'7.5',fill:'#e2e8f0','font-weight':'500'},g).textContent=l1;
      if(l2)$('text',{x:hx,y:hy+6.5,'text-anchor':'middle','font-size':'7.5',fill:'#e2e8f0','font-weight':'500'},g).textContent=l2;
      g.addEventListener('click',()=>showH(id,i));
    });
    let tY=p.cy+rR+48;
    p.tk.forEach((tk,i)=>{
      let tx=p.cx+(i-(p.tk.length-1)/2)*85;
      let tv=pv;
      $('line',{x1:p.cx,y1:p.cy+40,x2:tx,y2:tY,stroke:'#444','stroke-opacity':tv*.2,'stroke-width':1},svg);
      if(tv>.5)$('line',{x1:p.cx,y1:p.cy+40,x2:tx,y2:tY,stroke:'#555','stroke-opacity':.2,'stroke-width':1,'stroke-dasharray':'2,16',class:'pulse'},svg);
      let tg=$('g',{style:`opacity:${tv*.45}`},svg);
      $('rect',{x:tx-40,y:tY-10,width:80,height:20,rx:4,fill:'rgba(255,255,255,.02)',stroke:'#444','stroke-opacity':.3,'stroke-width':1},tg);
      $('text',{x:tx,y:tY+2,'text-anchor':'middle','font-size':'6.5',fill:'#777','font-weight':'500'},tg).textContent=tk;
    });
    let pg=$('g',{style:`cursor:pointer;opacity:${pv}`},svg);
    $('circle',{cx:p.cx,cy:p.cy,r:42,fill:p.pc,'fill-opacity':.06,stroke:p.pc,'stroke-width':2.5,'stroke-opacity':.6},pg);
    $('circle',{cx:p.cx,cy:p.cy,r:36,fill:'#0a0e17','fill-opacity':.85},pg);
    $('text',{x:p.cx,y:p.cy-7,'text-anchor':'middle','font-size':'16','font-weight':'900',fill:'#fff'},pg).textContent=id;
    $('text',{x:p.cx,y:p.cy+6,'text-anchor':'middle','font-size':'7','font-weight':'500',fill:'rgba(255,255,255,.45)'},pg).textContent=p.sub.substring(0,22);
    let bY=p.cy+22;
    let bW=p.pri.length*3.8+14;
    $('rect',{x:p.cx-bW/2,y:bY-2,width:bW,height:14,rx:3,fill:p.pc,'fill-opacity':.12,stroke:p.pc,'stroke-opacity':.35,'stroke-width':1},pg);
    $('text',{x:p.cx,y:bY+8.5,'text-anchor':'middle','font-size':'6.5','font-weight':'700',fill:p.pc,'font-family':"'JetBrains Mono',monospace"},pg).textContent=p.pri;
    $('text',{x:p.cx,y:bY+22,'text-anchor':'middle','font-size':'6',fill:'rgba(255,255,255,.25)','font-family':"'JetBrains Mono',monospace"},pg).textContent=`${p.ph} · ${p.inv}`;
    let hCount={H:0,O:0,T:0};
    p.h.forEach(h=>{hCount[h.t]++});
    let sumX=p.cx-30;
    ['H','O','T'].forEach((t,i)=>{
      let sx=sumX+i*22;
      $('rect',{x:sx,y:bY+28,width:18,height:11,rx:2,fill:HC[t],'fill-opacity':.1,stroke:HC[t],'stroke-opacity':.3,'stroke-width':.5},pg);
      $('text',{x:sx+9,y:bY+36,'text-anchor':'middle','font-size':'7',fill:HC[t],'font-weight':'700','font-family':"'JetBrains Mono',monospace"},pg).textContent=`${t}${hCount[t]}`;
    });
    pg.addEventListener('click',()=>showP(id));
  });
}

function showP(id){
  let p=PJ[id];
  let counts={0:0,1:0,2:0};
  p.h.forEach(h=>counts[h.s]++);
  document.getElementById('pc').innerHTML=`
    <div class="mt" style="color:${p.pc}">${p.pri} · ${p.ph} · ${p.inv}</div>
    <h3>${p.label} — ${p.sub}</h3>
    <p>${p.dt}</p>
    <p style="font-weight:600;color:#e2e8f0;margin-top:.5rem;font-size:.72rem">
      Habilitadores: <span style="color:#ef4444">${counts[0]} sin resolver</span> ·
      <span style="color:#eab308">${counts[1]} parcial</span> ·
      <span style="color:#22c55e">${counts[2]} listo</span>
    </p>
    ${p.h.map(h=>{
      let sc=h.s===0?'#ef4444':h.s===2?'#22c55e':'#eab308';
      let ic=h.s===0?'✗':h.s===2?'✓':'⚠️';
      return `<div class="hi ${h.t}"><span class="badge ${h.t}">${h.t}</span>${h.l}<span class="s" style="color:${sc}">${ic} ${h.st}</span></div>`;
    }).join('')}
    <p style="font-weight:600;color:#e2e8f0;margin-top:.5rem;font-size:.72rem">Tareas:</p>
    ${p.tk.map(t=>`<div class="hi" style="border-left-color:#555;color:#777">${t}</div>`).join('')}`;
  document.getElementById('pn').classList.add('open');
}

function showH(pid,idx){
  let p=PJ[pid],h=p.h[idx];
  let sc=h.s===0?'#ef4444':h.s===2?'#22c55e':'#eab308';
  let sl=h.s===0?'✗ No existe':h.s===2?'✓ Disponible':'⚠️ Parcial';
  let tc=HC[h.t];
  let shared=[];
  Object.entries(PJ).forEach(([oid,op])=>{
    if(oid!==pid) op.h.forEach(oh=>{if(oh.l===h.l)shared.push(oid)});
  });
  document.getElementById('pc').innerHTML=`
    <div class="mt"><span style="color:${tc}">${HN[h.t]}</span> · Proyecto ${pid} · ${p.pri}</div>
    <h3 style="color:${tc}">${h.l}</h3>
    <p style="font-size:.85rem;color:${tc};margin-bottom:.5rem;font-style:italic">${HQ[h.t]}</p>
    <p>Estado: <strong style="color:${sc}">${sl}</strong></p>
    <p>${h.st}</p>
    <p style="margin-top:.4rem;color:#e2e8f0;font-size:.8rem"><strong>Acción requerida:</strong> ${h.q}</p>
    ${shared.length?`<p style="margin-top:.3rem;font-size:.72rem;color:#f97316">También conecta con: ${shared.join(', ')}</p>`:''}
    <p style="margin-top:.5rem;font-size:.72rem;color:#38bdf8;font-weight:600">→ Este habilitador es donde hay que trabajar para desbloquear ${pid}.</p>`;
  document.getElementById('pn').classList.add('open');
}

document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    flt=b.dataset.f;
    render();
  });
});

render();
</script>
</body>
</html>
