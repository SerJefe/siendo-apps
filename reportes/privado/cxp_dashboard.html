<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:24px;color:#38bdf8}
.header .date{color:#94a3b8;font-size:14px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:#1e293b;border-radius:12px;padding:20px;text-align:center;border-left:4px solid}
.kpi .label{color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.kpi .value{font-size:28px;font-weight:700;margin-top:4px}
.kpi .sub{color:#64748b;font-size:12px;margin-top:4px}
.kpi.total{border-color:#38bdf8}.kpi.total .value{color:#38bdf8}
.kpi.overdue{border-color:#f43f5e}.kpi.overdue .value{color:#f43f5e}
.kpi.current{border-color:#22c55e}.kpi.current .value{color:#22c55e}
.kpi.count{border-color:#f59e0b}.kpi.count .value{color:#f59e0b}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.card{background:#1e293b;border-radius:12px;padding:20px}
.card h3{color:#38bdf8;font-size:14px;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid #334155;padding-bottom:8px}
.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#94a3b8;font-weight:600;padding:8px 12px;border-bottom:1px solid #334155}
td{padding:8px 12px;border-bottom:1px solid #1e293b}
tr:hover td{background:#334155}
.amount{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.danger{background:#7f1d1d;color:#fca5a5}
.badge.warning{background:#78350f;color:#fcd34d}
.badge.ok{background:#14532d;color:#86efac}
.bar-row{display:flex;align-items:center;margin-bottom:8px;font-size:13px}
.bar-row .name{width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bar-bg{flex:1;height:24px;background:#334155;border-radius:4px;margin:0 12px;position:relative;overflow:hidden}
.bar-row .bar-fill{height:100%;border-radius:4px;position:absolute;left:0;top:0}
.bar-row .bar-overdue{background:#f43f5e}
.bar-row .bar-current{background:#22c55e}
.bar-row .val{width:120px;text-align:right;font-variant-numeric:tabular-nums;color:#94a3b8}
.health-indicator{display:flex;align-items:center;gap:8px;margin-top:12px;padding:12px;background:#334155;border-radius:8px}
.health-dot{width:12px;height:12px;border-radius:50%}
.health-dot.red{background:#f43f5e}
.health-dot.yellow{background:#f59e0b}
.health-dot.green{background:#22c55e}
@media(max-width:768px){.kpis,.grid{grid-template-columns:1fr}}
</style>
</head>

const fmt = n => '$' + Math.round(n).toLocaleString('es-CO');
const fmtM = n => '$' + (n/1e6).toFixed(0) + 'M';

// KPIs
document.getElementById('genDate').textContent = 'Generado: ' + DATA.generated + ' | Datos en tiempo real desde Odoo';
document.getElementById('kpiTotal').textContent = fmtM(DATA.summary.total_cxp);
document.getElementById('kpiTotalCount').textContent = DATA.summary.count_total + ' facturas';
document.getElementById('kpiOverdue').textContent = fmtM(DATA.summary.total_overdue);
document.getElementById('kpiOverdueCount').textContent = DATA.summary.count_overdue + ' facturas vencidas';
const currentAmt = DATA.summary.total_cxp - DATA.summary.total_overdue;
document.getElementById('kpiCurrent').textContent = fmtM(currentAmt);
const pct = ((currentAmt / DATA.summary.total_cxp) * 100).toFixed(1);
document.getElementById('kpiCurrentPct').textContent = pct + '% del total';
document.getElementById('kpiHealth').textContent = pct + '%';

// Health
const dot = document.getElementById('healthDot');
const htxt = document.getElementById('healthText');
if (pct < 30) { dot.className='health-dot red'; htxt.textContent='⚠️ Estado crítico: '+pct+'% al día. Más del 70% de las CxP están vencidas.'; }
else if (pct < 50) { dot.className='health-dot yellow'; htxt.textContent='⚡ Atención: '+pct+'% al día. Hay presión significativa en vencimientos.'; }
else { dot.className='health-dot green'; htxt.textContent='✅ Saludable: '+pct+'% al día.'; }

// Aging Chart
const agingLabels = Object.keys(DATA.aging);
const agingValues = Object.values(DATA.aging);
const agingColors = ['#dc2626','#f97316','#eab308','#3b82f6','#22c55e'];
new Chart(document.getElementById('agingChart'), {
  type: 'doughnut',
  data: { labels: agingLabels, datasets: [{ data: agingValues, backgroundColor: agingColors, borderWidth: 0 }] },
  options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font:{size:12}, generateLabels: function(chart) {
    return chart.data.labels.map((l,i) => ({text: l+': '+fmtM(chart.data.datasets[0].data[i]), fillStyle: agingColors[i], strokeStyle: agingColors[i], index:i}));
  }}}}
  }
});

// Contract Chart
const cLabels = DATA.contracts.map(c=>c.name);
const cTotals = DATA.contracts.map(c=>c.total);
const cOverdue = DATA.contracts.map(c=>c.overdue);
new Chart(document.getElementById('contractChart'), {
  type: 'bar',
  data: {
    labels: cLabels,
    datasets: [
      { label: 'Vencido', data: cOverdue, backgroundColor: '#f43f5e', borderRadius: 4 },
      { label: 'Al día', data: cTotals.map((t,i)=>t-cOverdue[i]), backgroundColor: '#22c55e', borderRadius: 4 }
    ]
  },
  options: { responsive: true, indexAxis: 'y', scales: { x: { stacked: true, ticks:{color:'#64748b',callback:v=>fmtM(v)}, grid:{color:'#334155'} }, y: { stacked: true, ticks:{color:'#94a3b8',font:{size:11}}, grid:{display:false} } }, plugins: { legend:{labels:{color:'#94a3b8'}} } }
});

  const row = document.createElement('div');
  row.className = 'bar-row';
  row.innerHTML = '<div class="name" title="'+p.name+'">'+p.name.substring(0,28)+'</div>'
    +'<div class="bar-bg"><div class="bar-fill bar-overdue" style="width:'+pctTotal+'%;opacity:0.7"></div><div class="bar-fill bar-current" style="width:'+(pctTotal*(1-pctOverdue/100))+'%"></div></div>'
    +'<div class="val">'+fmtM(p.total)+' ('+p.items+')</div>';
  container.appendChild(row);
});

// Detail Table
const tbody = document.querySelector('#detailTable tbody');
DATA.detail.slice(0,50).forEach(d => {
  const tr = document.createElement('tr');
  let badge = '';
  if(d.days > 60) badge='<span class="badge danger">'+d.days+'d</span>';
  else if(d.days > 0) badge='<span class="badge warning">'+d.days+'d</span>';
  else badge='<span class="badge ok">Al día</span>';
  tr.innerHTML = '<td>'+d.partner.substring(0,30)+'</td><td>'+d.move+'</td><td>'+d.ref+'</td><td>'+d.contract+'</td><td>'+d.due+'</td><td>'+d.days+'</td><td class="amount">'+fmt(d.amount)+'</td><td>'+badge+'</td>';
  tbody.appendChild(tr);
});
</script>
</body>
</html>
